name: Prod DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: self-hosted 

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4

    - name: 2. Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: vandaj98
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 3. Build & Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          vandaj98/devops-prod-app:${{ github.sha }}
          vandaj98/devops-prod-app:latest

    - name: 4. Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vandaj98/devops-prod-app:${{ github.sha }}'
        format: 'table'
        # Chú ý: Đang để 0 để bạn xem bảng báo cáo trước. 
        # Khi nào muốn Trivy khóa mõm tiến trình nếu có lỗi, đổi số 0 thành số 1
        exit-code: '0' 
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: 5. Deploy to Swarm
      run: |
        export IMAGE_TAG=${{ github.sha }}
        # Tên stack mới là prod_stack
        docker stack deploy --with-registry-auth -c docker-compose.yml prod_stack
